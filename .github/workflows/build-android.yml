name: 🏪 Build Play Store APK/AAB

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - 'twa-manifest.json'
      - '.github/workflows/build-android.yml'
      - 'tools/generate-android-project.js'

permissions:
  contents: write

env:
  PACKAGE_ID: id.rawajati.prima
  KEY_ALIAS:  prima

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js 20 ────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install Bubblewrap (provides @bubblewrap/core) ─────────
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      # ── 5. Android SDK licenses + build-tools ────────────────────
      - name: Accept Android SDK licenses & install build-tools
        run: |
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "Android SDK: $SDK"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -3

      # ── 6. Keystore: restore or generate ─────────────────────────
      - name: Setup signing keystore
        id: keystore
        run: |
          KEY_PASS="${KEY_PASSWORD:-prima2026rawajati}"

          if [ -n "$KEYSTORE_B64" ]; then
            echo "🔑 Restoring keystore from secret..."
            printf '%s' "$KEYSTORE_B64" | base64 --decode > android.keystore
          else
            echo "🔑 Generating new keystore (first run)..."
            keytool -genkeypair \
              -keystore android.keystore \
              -alias "${{ env.KEY_ALIAS }}" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Kelurahan Rawajati,OU=Kelurahan,O=Pemerintah DKI Jakarta,L=Jakarta Selatan,ST=DKI Jakarta,C=ID" \
              -storepass "$KEY_PASS" -keypass "$KEY_PASS" -noprompt

            echo ""
            echo "========================================================"
            echo "⚠️  SALIN BASE64 INI → simpan sebagai GitHub secret KEYSTORE_BASE64"
            echo "========================================================"
            base64 -w 0 android.keystore
            echo ""
            echo "========================================================"
          fi

          FP=$(keytool -list -v -keystore android.keystore \
            -alias "${{ env.KEY_ALIAS }}" -storepass "$KEY_PASS" 2>/dev/null \
            | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "sha256=${FP}"  >> "$GITHUB_OUTPUT"
          echo "key_pass=${KEY_PASS}" >> "$GITHUB_OUTPUT"
          echo "✅ SHA-256: ${FP}"
        env:
          KEYSTORE_B64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}

      # ── 7. Inject credentials + version into twa-manifest.json ───
      - name: Inject signing credentials
        run: |
          python3 - << 'PYEOF'
          import json, os

          with open('twa-manifest.json') as f:
              m = json.load(f)

          m['appVersion']    = os.environ['VERSION_CODE']
          m['appVersionName']= os.environ['VERSION_NAME']
          m['signingKey']['path']          = os.path.abspath('android.keystore')
          m['signingKey']['storePassword'] = os.environ['KEY_PASS']
          m['signingKey']['keyPassword']   = os.environ['KEY_PASS']

          with open('twa-manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          print('✅ twa-manifest.json: credentials + version injected')
          PYEOF
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code || '1' }}
          VERSION_NAME: ${{ github.event.inputs.version_name || '1.0.0' }}
          KEY_PASS:     ${{ steps.keystore.outputs.key_pass }}

      # ── 8. Generate Android project (non-interactive) ─────────────
      # Uses @bubblewrap/core programmatically — bypasses CLI prompts
      - name: Generate Android project
        run: |
          # Resolve @bubblewrap/core from global npm
          export NODE_PATH=$(npm root -g)
          echo "NODE_PATH: $NODE_PATH"
          node tools/generate-android-project.js 2>&1

      # ── 9. Build APK + AAB via Gradle (direct, no bubblewrap build) ─
      - name: Build release APK + AAB (Gradle)
        run: |
          KEY_PASS="${{ steps.keystore.outputs.key_pass }}"
          KS_PATH="$(pwd)/android.keystore"

          chmod +x gradlew 2>/dev/null || true

          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KEY_PASS" \
            -Pandroid.injected.signing.key.alias="${{ env.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --no-daemon 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME:    ${{ env.JAVA_HOME }}

      # ── 10. Find artifacts ────────────────────────────────────────
      - name: Locate build outputs
        id: outputs
        run: |
          echo "=== APK/AAB files ==="
          find . \( -name "*.aab" -o -name "*.apk" \) \
            ! -path "*/node_modules/*" ! -path "*/.gradle/*" ! -path "*/debug/*"
          AAB=$(find . -name "*release*.aab" ! -path "*/node_modules/*" ! -path "*/.gradle/*" | head -1)
          APK=$(find . -name "*release*.apk" ! -path "*/node_modules/*" ! -path "*/.gradle/*" | head -1)
          echo "aab=${AAB}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"

      # ── 11. Upload AAB ────────────────────────────────────────────
      - name: Upload AAB (Play Store)
        if: ${{ steps.outputs.outputs.aab != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prima-aab-v${{ github.run_number }}
          path: ${{ steps.outputs.outputs.aab }}
          retention-days: 60

      - name: Upload APK (direct install)
        if: ${{ steps.outputs.outputs.apk != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prima-apk-v${{ github.run_number }}
          path: ${{ steps.outputs.outputs.apk }}
          retention-days: 60

      # ── 12. Update assetlinks.json ────────────────────────────────
      - name: Update assetlinks.json with SHA-256
        run: |
          SHA="${{ steps.keystore.outputs.sha256 }}"
          [ -z "$SHA" ] && echo "No SHA-256, skip" && exit 0
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"%s","sha256_cert_fingerprints":["%s"]}}]\n' \
            "${{ env.PACKAGE_ID }}" "$SHA" \
            | python3 -m json.tool > .well-known/assetlinks.json
          echo "✅ assetlinks.json → $SHA"

      # ── 13. Commit assetlinks ─────────────────────────────────────
      - name: Commit assetlinks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          git diff --staged --quiet \
            && echo "No changes" \
            || git commit -m "chore: update assetlinks.json SHA-256 [skip ci]"
          git push || echo "Nothing to push"

      # ── 14. Summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          SHA="${{ steps.keystore.outputs.sha256 }}"
          AAB="${{ steps.outputs.outputs.aab }}"
          {
            echo "## 🏪 PRIMA Play Store Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package ID | \`${{ env.PACKAGE_ID }}\` |"
            echo "| SHA-256 upload key | \`${SHA:-not generated}\` |"
            echo "| AAB | \`${AAB:-not found}\` |"
            echo ""
            echo "### Langkah selanjutnya"
            echo "1. Download artifact **.aab** dari tab **Artifacts**"
            echo "2. Upload ke [Google Play Console](https://play.google.com/console)"
            echo "3. Simpan \`KEYSTORE_BASE64\` dari log step 6 sebagai GitHub secret"
          } >> "$GITHUB_STEP_SUMMARY"
