name: 🏪 Build Play Store APK/AAB

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (kosong = pakai twa-manifest.json)'
        required: false
        default: ''
      version_name:
        description: 'Version name (kosong = pakai twa-manifest.json)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - 'twa-manifest.json'
      - '.github/workflows/build-android.yml'
      - 'tools/generate-android-project.js'

permissions:
  contents: write

env:
  PACKAGE_ID:    id.rawajati.prima
  KEY_ALIAS:     prima
  GRADLE_VER:    8.4

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js (for generate script) ─────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Android SDK build-tools ────────────────────────────────
      - name: Accept Android SDK licenses & install build-tools
        run: |
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "Android SDK: $SDK"
          echo "ANDROID_HOME=${SDK}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${SDK}" >> "$GITHUB_ENV"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "build-tools;35.0.0" "platforms;android-35" 2>&1 | tail -3

      # ── 5. Keystore ───────────────────────────────────────────────
      - name: Setup signing keystore
        id: keystore
        run: |
          KEY_PASS="${KEY_PASSWORD:-prima2026rawajati}"

          if [ -n "$KEYSTORE_B64" ]; then
            echo "🔑 Restoring keystore from secret..."
            printf '%s' "$KEYSTORE_B64" | base64 --decode > android.keystore
          else
            echo "🔑 Generating new keystore (first run)..."
            keytool -genkeypair \
              -keystore android.keystore \
              -alias "${{ env.KEY_ALIAS }}" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Kelurahan Rawajati,OU=Kelurahan,O=Pemerintah DKI Jakarta,L=Jakarta Selatan,ST=DKI Jakarta,C=ID" \
              -storepass "$KEY_PASS" -keypass "$KEY_PASS" -noprompt

            echo "========================================================"
            echo "⚠️  SALIN BASE64 INI → GitHub secret: KEYSTORE_BASE64"
            echo "========================================================"
            base64 -w 0 android.keystore
            echo ""
            echo "========================================================"
          fi

          FP=$(keytool -list -v -keystore android.keystore \
                 -alias "${{ env.KEY_ALIAS }}" -storepass "$KEY_PASS" 2>/dev/null \
                 | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "sha256=${FP}"     >> "$GITHUB_OUTPUT"
          echo "key_pass=${KEY_PASS}" >> "$GITHUB_OUTPUT"
          echo "✅ SHA-256: ${FP}"
        env:
          KEYSTORE_B64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}

      # ── 6. Inject credentials into twa-manifest.json ─────────────
      - name: Inject signing credentials
        run: |
          python3 - << 'PYEOF'
          import json, os
          with open('twa-manifest.json') as f:
              m = json.load(f)
          if os.environ.get('VERSION_CODE'):
              m['appVersion'] = os.environ['VERSION_CODE']
          if os.environ.get('VERSION_NAME'):
              m['appVersionName'] = os.environ['VERSION_NAME']
          print(f"versionCode={m['appVersion']} versionName={m['appVersionName']}")
          m['signingKey']['path']          = os.path.abspath('android.keystore')
          m['signingKey']['storePassword'] = os.environ['KEY_PASS']
          m['signingKey']['keyPassword']   = os.environ['KEY_PASS']
          with open('twa-manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          print('✅ twa-manifest.json updated')
          PYEOF
        env:
          VERSION_CODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_code || '' }}
          VERSION_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_name || '' }}
          KEY_PASS:     ${{ steps.keystore.outputs.key_pass }}

      # ── 7. Generate Android project (zero-dependency template) ────
      # Pure Node.js stdlib — no @bubblewrap/core dependency
      - name: Generate Android project from template
        run: node tools/generate-android-project.js 2>&1

      # ── 8. Download Gradle ${{ env.GRADLE_VER }} ──────────────────
      - name: Download Gradle ${{ env.GRADLE_VER }}
        run: |
          GRADLE_ZIP="gradle-${{ env.GRADLE_VER }}-bin.zip"
          echo "Downloading Gradle ${{ env.GRADLE_VER }}..."
          wget -q "https://services.gradle.org/distributions/${GRADLE_ZIP}"
          unzip -q "${GRADLE_ZIP}"
          echo "GRADLE_HOME=$(pwd)/gradle-${{ env.GRADLE_VER }}" >> "$GITHUB_ENV"
          echo "$(pwd)/gradle-${{ env.GRADLE_VER }}/bin" >> "$GITHUB_PATH"
          gradle --version

      # ── 9. Build release APK + AAB ────────────────────────────────
      - name: Build release APK + AAB
        run: |
          KEY_PASS="${{ steps.keystore.outputs.key_pass }}"
          KS_PATH="$(pwd)/android.keystore"

          echo "=== Environment Check ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "Gradle: $(gradle --version 2>&1 | head -1)"
          echo "Files: $(ls -la settings.gradle build.gradle 2>&1)"
          echo "========================="

          # Create local.properties (AGP prefers sdk.dir over ANDROID_HOME)
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "Wrote local.properties: $(cat local.properties)"

          # Build and capture output; on failure, show last 80 lines in summary
          gradle bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KEY_PASS" \
            -Pandroid.injected.signing.key.alias="${{ env.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "❌ Gradle build FAILED (exit $BUILD_EXIT)"
            {
              echo "## ❌ Gradle Build Error"
              echo '```'
              tail -80 /tmp/gradle-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$BUILD_EXIT"
          fi

      # ── 10. Find artifacts (signed release only — NOT intermediary-bundle.aab) ──
      - name: Locate build outputs
        id: outputs
        run: |
          echo "=== APK/AAB files ==="
          find . \( -name "*.aab" -o -name "*.apk" \) \
            ! -path "*/node_modules/*" ! -path "*/.gradle/*" ! -path "*/debug/*" \
            ! -path "*/gradle-*/*" ! -path "*/intermediaries/*"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$AAB" ]; then
            AAB=$(find . -path "*/outputs/bundle/release/app-release.aab" 2>/dev/null | head -1)
          fi
          if [ ! -f "$APK" ]; then
            APK=$(find . -path "*/outputs/apk/release/app-release.apk" 2>/dev/null | head -1)
          fi
          if [ ! -f "$AAB" ]; then
            echo "❌ Signed app-release.aab not found"
            exit 1
          fi
          echo "aab=${AAB}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"
          echo "AAB: ${AAB}"
          echo "APK: ${APK:-not found}"

      - name: Label AAB (hindari file lama di laptop)
        id: labeled
        if: ${{ steps.outputs.outputs.aab != '' }}
        run: |
          AAB="${{ steps.outputs.outputs.aab }}"
          VC=$(python3 -c "import json; print(json.load(open('twa-manifest.json'))['appVersion'])")
          VN=$(python3 -c "import json; print(json.load(open('twa-manifest.json'))['appVersionName'])")
          mkdir -p dist
          OUT="dist/PRIMA-v${VN}-code${VC}-targetSdk35.aab"
          cp "$AAB" "$OUT"
          echo "labeled=${OUT}" >> "$GITHUB_OUTPUT"
          echo "✅ File untuk Play Console: $(basename "$OUT")"

      # ── 11. Upload ────────────────────────────────────────────────
      - name: Upload AAB (Play Store)
        if: ${{ steps.labeled.outputs.labeled != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prima-aab-v${{ github.run_number }}-sdk35
          path: dist/
          retention-days: 60

      - name: Upload APK (direct install)
        if: ${{ steps.outputs.outputs.apk != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prima-apk-v${{ github.run_number }}
          path: ${{ steps.outputs.outputs.apk }}
          retention-days: 60

      # ── 12. Update assetlinks.json (upload key + Play App Signing) ─
      - name: Update assetlinks.json
        if: ${{ steps.keystore.outputs.sha256 != '' }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          def norm(fp):
              return fp.strip().upper().replace(" ", "")

          fps = []
          for raw in (
              os.environ.get("UPLOAD_SHA", ""),
              os.environ.get("PLAY_SHA", ""),
          ):
              if raw:
                  n = norm(raw)
                  if n and n not in fps:
                      fps.append(n)

          with open("twa-manifest.json", encoding="utf-8") as f:
              for raw in json.load(f).get("fingerprints") or []:
                  if raw:
                      n = norm(str(raw))
                      if n and n not in fps:
                          fps.append(n)

          if not fps:
              raise SystemExit("No SHA-256 fingerprints for assetlinks.json")

          doc = [{
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                  "namespace": "android_app",
                  "package_name": os.environ["PACKAGE_ID"],
                  "sha256_cert_fingerprints": [fp],
              },
          } for fp in fps]
          with open(".well-known/assetlinks.json", "w", encoding="utf-8") as f:
              json.dump(doc, f, indent=4)
              f.write("\n")
          print("✅ assetlinks.json fingerprints:")
          for fp in fps:
              print(f"   - {fp}")
          if len(fps) < 2:
              print("⚠️  Tambahkan PLAY_APP_SIGNING_SHA256 (GitHub secret) agar TWA fullscreen dari Play Store.")
          PYEOF
        env:
          PACKAGE_ID: ${{ env.PACKAGE_ID }}
          UPLOAD_SHA: ${{ steps.keystore.outputs.sha256 }}
          PLAY_SHA:     ${{ secrets.PLAY_APP_SIGNING_SHA256 }}

      - name: Commit assetlinks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          git diff --staged --quiet \
            && echo "No changes" \
            || git commit -m "chore: update assetlinks.json SHA-256 [skip ci]"
          git push || echo "Nothing to push"

      # ── 13. Summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          SHA="${{ steps.keystore.outputs.sha256 }}"
          AAB="${{ steps.outputs.outputs.aab }}"
          {
            echo "## 🏪 PRIMA Play Store Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package ID | \`${{ env.PACKAGE_ID }}\` |"
            echo "| SHA-256 upload key | \`${SHA:-not generated}\` |"
            echo "| AAB | \`${AAB:-not found}\` |"
            VC=$(python3 -c "import json; print(json.load(open('twa-manifest.json'))['appVersion'])" 2>/dev/null || echo "?")
            VN=$(python3 -c "import json; print(json.load(open('twa-manifest.json'))['appVersionName'])" 2>/dev/null || echo "?")
            echo "| versionCode | **${VC}** |"
            echo "| versionName | **${VN}** |"
            echo "| targetSdk | **35** |"
            echo ""
            echo "### Langkah selanjutnya"
            echo "1. Download artifact **prima-aab-v*-sdk35** → file \`PRIMA-v*-code*-targetSdk35.aab\`"
            echo "2. Upload ke [Google Play Console](https://play.google.com/console)"
            echo "3. Simpan \`KEYSTORE_BASE64\` dari log step 5 sebagai GitHub secret"
          } >> "$GITHUB_STEP_SUMMARY"
